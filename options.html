<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日本語表記変換システム 設定</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --panel: #fffaf1;
      --panel-strong: #f0e6d2;
      --ink: #1d1a16;
      --muted: #635949;
      --line: #d8c7aa;
      --accent: #7c2d12;
      --danger: #9f1239;
      --warn: #a16207;
      --shadow: 0 16px 38px rgba(60, 36, 8, 0.08);
      --radius: 16px;
      --mono: "BIZ UDPGothic", "Yu Gothic UI", monospace;
      --sans: "BIZ UDPGothic", "Yu Gothic UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: var(--sans);
      background:
        radial-gradient(circle at top right, rgba(124, 45, 18, 0.16), transparent 32%),
        linear-gradient(180deg, #fbf7ee 0%, var(--bg) 58%, #efe2cb 100%);
    }

    .shell {
      width: min(1400px, calc(100% - 14px));
      margin: 8px auto 18px;
    }

    .hero,
    .toolbar,
    .tabbar,
    .bundle-card,
    .diagnostics-card,
    .group-card,
    .panel-block {
      background: var(--panel);
      border: 1px solid rgba(124, 45, 18, 0.12);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px 10px;
    }

    .hero { margin-bottom: 8px; }
    .hero h1 { margin: 0 0 6px; font-size: clamp(22px, 3.8vw, 30px); line-height: 1.1; }
    .hero p, .hero li, .status, .count, .diag-summary { color: var(--muted); line-height: 1.5; }
    .hero ul { margin: 6px 0 0; padding-left: 18px; }

    .toolbar {
      position: sticky;
      top: 10px;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      backdrop-filter: blur(10px);
    }

    .toolbar-actions, .bundle-actions, .group-actions, .panel-actions, .bundle-title, .group-title {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .status { min-height: 22px; font-size: 13px; }
    .status[data-type="success"] { color: #166534; }
    .status[data-type="error"] { color: #b91c1c; }

    .tabbar { display: flex; gap: 8px; margin-bottom: 8px; }
    .tab-panel[hidden] { display: none; }
    .bundle-grid, .diagnostics-grid, .bundle-body { display: grid; gap: 8px; }

    .bundle-head, .group-head, .panel-head {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .bundle-title h2, .group-title h3, .panel-head h4, .diagnostics-card h2, .diag-item h3 { margin: 0; }
    .bundle-title h2 { font-size: 20px; }
    .group-title h3 { font-size: 17px; }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--panel-strong);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.03em;
    }

    .title-button {
      appearance: none;
      border: 0;
      padding: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: text;
    }

    button, input, select, textarea { font: inherit; }

    button {
      appearance: none;
      border: 1px solid rgba(29, 26, 22, 0.12);
      border-radius: 10px;
      background: #fff8ec;
      color: var(--ink);
      padding: 5px 9px;
      cursor: pointer;
    }

    button.primary { background: var(--accent); border-color: var(--accent); color: #fff9f2; }
    button.secondary { background: #f3eadc; }
    button.ghost { background: transparent; }
    button.warn { border-color: rgba(161, 98, 7, 0.3); color: #92400e; }
    button.danger { border-color: rgba(159, 18, 57, 0.25); color: #9f1239; }
    .tab-button[aria-selected="true"] { background: var(--accent); border-color: var(--accent); color: #fff9f2; }

    .toggle { display: inline-flex; gap: 4px; align-items: center; color: var(--muted); font-size: 13px; }
    .scroll-area { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; min-width: 560px; }
    th, td {
      padding: 4px 5px;
      border-bottom: 1px solid rgba(216, 199, 170, 0.7);
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }
    th { color: var(--muted); font-size: 12px; font-weight: 700; }
    .check-col { width: 1%; text-align: center; }
    .action-col { width: 1%; }

    input[type="text"], input[type="number"], textarea {
      min-width: 0;
      padding: 4px 6px;
      border: 1px solid rgba(29, 26, 22, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
    }

    .cell-input { width: auto; min-width: 6ch; max-width: 30ch; }
    .cell-input.compact { min-width: 5ch; max-width: 8ch; }
    .title-editor { min-width: 8ch; max-width: 28ch; }
    input[type="checkbox"] { inline-size: 15px; block-size: 15px; }

    .diag-list { display: grid; gap: 8px; }
    .diag-item {
      border: 1px solid rgba(161, 98, 7, 0.2);
      background: rgba(255, 251, 235, 0.9);
      border-radius: 12px;
      padding: 8px;
    }
    .diag-occurrence, code { font-family: var(--mono); font-size: 13px; line-height: 1.6; }

    @media (max-width: 780px) {
      .shell { width: min(100% - 8px, 100%); }
      .hero, .toolbar, .tabbar, .bundle-card, .diagnostics-card, .group-card, .panel-block { padding-inline: 8px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>日本語表記変換システム 設定</h1>
      <p>Bundle と Group を入れ子で管理し、各置換をその場で編集します。名称はダブルクリックで変更できます。</p>
      <ul>
        <li>保存後は変換対象タブを再読み込みしてください。</li>
        <li>設定は <code>chrome.storage.local</code> に保存され、拡張本体から参照されます。</li>
        <li>形態素解析タブで入力文の token を確認できます。</li>
      </ul>
    </section>

    <section class="toolbar">
      <div class="toolbar-actions">
        <button id="save-all" class="primary" type="button">全体を保存</button>
        <button id="add-bundle" class="secondary" type="button">Bundle追加</button>
        <button id="reload-defaults" class="secondary" type="button">既定値を再読込</button>
        <button id="import-settings" class="secondary" type="button">JSON/YAML 読込</button>
        <button id="export-json" class="ghost" type="button">JSON 書出</button>
        <button id="export-yaml" class="ghost" type="button">YAML 書出</button>
      </div>
      <div id="status" class="status" aria-live="polite"></div>
    </section>

    <nav class="tabbar" aria-label="設定タブ">
      <button id="tab-bundles" class="tab-button secondary" type="button" aria-selected="true">Bundle編集</button>
      <button id="tab-diagnostics" class="tab-button ghost" type="button" aria-selected="false">診断</button>
      <button id="tab-tokenizer" class="tab-button ghost" type="button" aria-selected="false">形態素解析</button>
    </nav>

    <section id="panel-bundles" class="tab-panel">
      <main id="bundle-root" class="bundle-grid" aria-live="polite"></main>
    </section>

    <section id="panel-diagnostics" class="tab-panel" hidden>
      <div id="diagnostics-root" class="diagnostics-grid" aria-live="polite"></div>
    </section>

    <section id="panel-tokenizer" class="tab-panel" hidden>
      <div class="diagnostics-card">
        <div class="panel-head">
          <h2>形態素解析テスト</h2>
          <div class="panel-actions">
            <button id="tokenizer-run" class="primary" type="button">解析</button>
          </div>
        </div>
        <div class="bundle-body">
          <textarea id="tokenizer-input" rows="5">それをやることにした。</textarea>
          <div class="scroll-area">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>表層</th>
                  <th>原形</th>
                  <th>品詞</th>
                  <th>品詞1</th>
                  <th>活用形</th>
                  <th>活用型</th>
                  <th>読</th>
                </tr>
              </thead>
              <tbody id="tokenizer-result"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </div>

  <input id="import-file" type="file" accept=".json,.yaml,.yml,application/json,text/yaml,text/x-yaml" hidden>

  <script src="lib/json5.min.js"></script>
  <script src="lib/kuromoji.js"></script>
  <script src="options.js"></script>
</body>
</html>
