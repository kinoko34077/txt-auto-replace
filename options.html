<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日本語表記変換システム 設定</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --panel: #fffaf1;
      --panel-strong: #f0e6d2;
      --ink: #1d1a16;
      --muted: #635949;
      --line: #d8c7aa;
      --accent: #7c2d12;
      --danger: #9f1239;
      --shadow: 0 16px 38px rgba(60, 36, 8, 0.08);
      --radius: 18px;
      --mono: "BIZ UDPGothic", "Yu Gothic UI", monospace;
      --sans: "BIZ UDPGothic", "Yu Gothic UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: var(--sans);
      background:
        radial-gradient(circle at top right, rgba(124, 45, 18, 0.16), transparent 32%),
        linear-gradient(180deg, #fbf7ee 0%, var(--bg) 58%, #efe2cb 100%);
    }

    .shell {
      width: min(1200px, calc(100% - 32px));
      margin: 24px auto 40px;
    }

    .hero,
    .toolbar,
    .bundle-card {
      background: var(--panel);
      border: 1px solid rgba(124, 45, 18, 0.12);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 24px 28px;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.1;
    }

    .hero p,
    .hero li,
    .status {
      color: var(--muted);
      line-height: 1.6;
    }

    .hero ul {
      margin: 10px 0 0;
      padding-left: 18px;
    }

    .toolbar {
      position: sticky;
      top: 12px;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }

    .toolbar-actions,
    .bundle-actions,
    .search-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .status {
      min-height: 24px;
      font-size: 14px;
    }

    .bundle-grid {
      display: grid;
      gap: 18px;
    }

    .bundle-card {
      padding: 20px;
    }

    .bundle-head {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .bundle-title {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .bundle-title h2 {
      margin: 0;
      font-size: 22px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--panel-strong);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .bundle-body {
      display: grid;
      gap: 16px;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .control-row .count {
      color: var(--muted);
      font-size: 13px;
    }

    .panel-block {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .panel-block h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .scroll-area {
      max-height: 320px;
      overflow: auto;
      border: 1px solid rgba(99, 89, 73, 0.18);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.82);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid rgba(99, 89, 73, 0.12);
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      background: #f9f2e5;
      text-align: left;
      font-size: 13px;
      color: var(--muted);
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fffdf8;
      color: var(--ink);
      font: inherit;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: 2px solid rgba(124, 45, 18, 0.2);
      border-color: var(--accent);
    }

    input.compact {
      width: 76px;
      text-align: center;
      font-family: var(--mono);
    }

    .search-input {
      min-width: min(320px, 100%);
    }

    .toggle {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease, background-color 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button.primary {
      background: var(--accent);
      color: #fff9f2;
    }

    button.secondary {
      background: var(--panel-strong);
      color: var(--ink);
    }

    button.ghost {
      background: transparent;
      border: 1px solid rgba(124, 45, 18, 0.18);
      color: var(--muted);
    }

    button.danger {
      background: rgba(159, 18, 57, 0.12);
      color: var(--danger);
    }

    .row-delete {
      width: 44px;
      min-width: 44px;
      padding-inline: 0;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .hidden-row {
      display: none;
    }

    @media (max-width: 780px) {
      .shell {
        width: min(100% - 18px, 100%);
        margin-top: 12px;
      }

      .hero,
      .toolbar,
      .bundle-card {
        padding-inline: 16px;
      }

      th:nth-child(4),
      td:nth-child(4) {
        min-width: 72px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>日本語表記変換システム 設定</h1>
      <p>旧字変換・一般単漢字置換・同音熟語置換の辞書を、このブラウザ内だけで個別に編集できます。</p>
      <ul>
        <li>保存後は、変換を確認したいページを再読み込みしてください。</li>
        <li>ここでの編集内容は `chrome.storage.local` に保存され、同じ端末のこの拡張にだけ反映されます。</li>
        <li>既定へ戻すと、その箱だけバンドル定義ファイルの内容に戻ります。</li>
      </ul>
    </section>

    <section class="toolbar">
      <div class="toolbar-actions">
        <button id="save-all" class="primary" type="button">全体を保存</button>
        <button id="reload-defaults" class="secondary" type="button">既定を再読込</button>
        <button id="import-settings" class="secondary" type="button">JSON/YAML 読込</button>
        <button id="export-json" class="ghost" type="button">JSON 書出</button>
        <button id="export-yaml" class="ghost" type="button">YAML 書出</button>
      </div>
      <div id="status" class="status" aria-live="polite"></div>
    </section>

    <main id="bundle-root" class="bundle-grid" aria-live="polite"></main>
  </div>

  <input id="import-file" type="file" accept=".json,.yaml,.yml,application/json,text/yaml,text/x-yaml" hidden>

  <script src="lib/json5.min.js"></script>
  <script src="options.js"></script>
</body>
</html>
